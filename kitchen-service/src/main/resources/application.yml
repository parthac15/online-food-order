server:
  port: 8082

spring:
  application:
    name: kitchen-service
  datasource:
    url: jdbc:mysql://localhost:3306/kitchendb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
