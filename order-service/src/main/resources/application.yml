server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
  activemq:
    broker-url: vm://embedded?broker.persistent=false
    in-memory: true

# Camunda uses the same MySQL datasource for process engine state
camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
    database:
      type: mysql
    filter:
      create: All tasks
    generic-properties:
      properties:
        history-time-to-live: P180D

# CORS configuration
app:
  cors:
    allowed-origins: http://localhost:5173
