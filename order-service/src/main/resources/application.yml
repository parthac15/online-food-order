server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  activemq:
    broker-url: vm://embedded?broker.persistent=false
    in-memory: true

# Camunda uses its own H2 database for process engine state
camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: Admin
    database:
      type: h2
    filter:
      create: All tasks
    generic-properties:
      properties:
        history-time-to-live: P180D

# CORS configuration
app:
  cors:
    allowed-origins: http://localhost:5173
