# Render Blueprint for FoodFlow Microservices
# Deploy with: Render Dashboard → New Blueprint Instance → Connect Repo
# Note: Each service builds the full Maven project; only the target JAR differs.
# Recommended: Starter plan ($7/mo per service) — free tier (512MB) is tight for Spring Boot + Camunda.

services:
  - type: web
    name: order-service
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile.order
    healthCheckPath: /api/orders
    envVars:
      - key: PORT
        value: 8080
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://onlinefoodorder123-dummycontent15-dd37.h.aivencloud.com:11005/defaultdb?useSSL=true
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: PAYMENT_SERVICE_URL
        value: https://payment-service.onrender.com/api/payments
      - key: KITCHEN_SERVICE_URL
        value: https://kitchen-service.onrender.com/api/kitchen/tickets
      - key: DELIVERY_SERVICE_URL
        value: https://delivery-service.onrender.com/api/deliveries

  - type: web
    name: payment-service
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile.payment
    healthCheckPath: /api/payments
    envVars:
      - key: PORT
        value: 8081
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://onlinefoodorder123-dummycontent15-dd37.h.aivencloud.com:11005/defaultdb?useSSL=true
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  - type: web
    name: kitchen-service
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile.kitchen
    healthCheckPath: /api/kitchen/health
    envVars:
      - key: PORT
        value: 8082
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://onlinefoodorder123-dummycontent15-dd37.h.aivencloud.com:11005/defaultdb?useSSL=true
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  - type: web
    name: delivery-service
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile.delivery
    healthCheckPath: /api/deliveries/health
    envVars:
      - key: PORT
        value: 8083
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://onlinefoodorder123-dummycontent15-dd37.h.aivencloud.com:11005/defaultdb?useSSL=true
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
